name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build (skip if HytaleServer.jar is missing)
        run: |
          if [ ! -f HytaleServer.jar ]; then
            echo "HytaleServer.jar not present, skipping compile in CI."
            exit 0
          fi
          ./gradlew shadowJar
